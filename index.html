<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真夜中の星屑食堂 - ノスタルジック・クッキング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --paper-color: #e8decb;
            --copper-dark: #8b4513;
            --copper-light: #cd853f;
            --text-accent: #d35400;
        }

        body {
            font-family: 'Shippori Mincho', serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><rect width="40" height="40" fill="none"/><path d="M0 40 L40 0 Z" stroke="rgba(255,255,255,0.03)" stroke-width="1"/></svg>');
            color: #dcdde1;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* 注文票（レシート・羊皮紙風） */
        .order-slip {
            background-color: var(--paper-color);
            color: #2c3e50;
            box-shadow: 2px 4px 15px rgba(0,0,0,0.5);
            position: relative;
            border-radius: 2px;
        }
        .order-slip::before {
            content: '';
            position: absolute;
            top: -10px; left: 0; right: 0; height: 10px;
            background: radial-gradient(circle, transparent, transparent 4px, var(--paper-color) 4px, var(--paper-color) 6px);
            background-size: 12px 10px;
        }

        /* アンティークな銅鍋 */
        .cauldron-container {
            position: relative;
            width: 240px;
            height: 180px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .cauldron {
            width: 200px;
            height: 90px;
            background: linear-gradient(135deg, #a0522d, #5c3a21);
            border-radius: 10px 10px 60px 60px;
            position: relative;
            box-shadow: inset -10px -10px 30px rgba(0,0,0,0.6), 0 15px 20px rgba(0,0,0,0.5);
            z-index: 10;
            border-bottom: 2px solid #3e2723;
        }

        .cauldron-lip {
            position: absolute;
            top: -15px;
            left: -10px;
            width: 220px;
            height: 30px;
            background: linear-gradient(to right, #cd853f, #8b4513, #cd853f);
            border-radius: 50%;
            border: 2px solid #5c3a21;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.2), 0 5px 10px rgba(0,0,0,0.4);
            z-index: 11;
        }

        .cauldron-inside {
            position: absolute;
            top: -5px;
            left: 5px;
            width: 190px;
            height: 20px;
            background: #2c3e50;
            border-radius: 50%;
            z-index: 12;
            box-shadow: inset 0 0 15px #111;
            transition: background 1s ease;
        }

        /* ガスバーナー風の青い炎 */
        .fire {
            position: absolute;
            bottom: -15px;
            width: 120px;
            height: 30px;
            display: flex;
            justify-content: space-evenly;
            align-items: flex-end;
            z-index: 5;
        }

        .flame {
            width: 12px;
            height: 15px;
            background: #3498db;
            border-radius: 50% 50% 0 0;
            animation: flicker-blue 0.4s infinite alternate;
            box-shadow: 0 0 10px #2980b9;
        }
        .flame:nth-child(2n) { height: 20px; background: #2ecc71; animation-delay: 0.1s; }
        
        @keyframes flicker-blue {
            0% { transform: scaleY(1) translateY(0); opacity: 0.7; }
            100% { transform: scaleY(1.3) translateY(-3px); opacity: 1; }
        }

        /* 調理中の激しい炎 */
        .cooking-flame {
            animation: intense-fire 0.1s infinite alternate !important;
            background: #e74c3c !important;
        }

        @keyframes intense-fire {
            0% { transform: scaleY(1.5) translateY(-5px); box-shadow: 0 0 20px #e67e22; }
            100% { transform: scaleY(2.5) translateY(-15px); box-shadow: 0 0 40px #f1c40f; }
        }

        /* 食材・アニメーション */
        .ingredient-btn {
            background: #2d2d2d;
            border: 1px solid #444;
            transition: all 0.2s;
            font-family: 'Zen Kaku Gothic New', sans-serif;
        }
        .ingredient-btn:hover {
            border-color: #cd853f;
            background: #3d3d3d;
            transform: translateY(-2px);
        }
        .ingredient-btn:active {
            transform: scale(0.95);
        }

        .ingredient-drop {
            position: absolute;
            font-size: 2rem;
            z-index: 20;
            animation: dropIn 0.4s forwards cubic-bezier(0.5, 0, 0.75, 0);
        }

        @keyframes dropIn {
            0% { transform: translateY(-80px) scale(1.2); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(10px) scale(0); opacity: 0; }
        }

        /* 調理シズル感 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: pop 0.8s ease-out forwards;
            z-index: 13;
        }
        @keyframes pop {
            0% { transform: scale(0.5) translateY(0); opacity: 0.8; }
            100% { transform: scale(2) translateY(-30px); opacity: 0; }
        }

        .steam {
            position: absolute;
            top: -30px;
            width: 10px; height: 10px;
            background: white;
            filter: blur(8px);
            border-radius: 50%;
            opacity: 0;
            animation: rise 3s infinite forwards;
            pointer-events: none;
            z-index: 15;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0.4; }
            100% { transform: translateY(-100px) scale(3); opacity: 0; }
        }

        /* 写真風の結果モーダル */
        .photo-frame {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transform: rotate(-2deg);
        }

        .modal-enter {
            animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes slideUp {
            0% { transform: translateY(50px) rotate(-5deg); opacity: 0; }
            100% { transform: translateY(0) rotate(-2deg); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <!-- ヘッダー -->
    <header class="text-center mb-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-[#cd853f] mb-2 tracking-widest border-b border-[#cd853f] pb-2 inline-block">星屑食堂</h1>
        <p class="text-gray-400 text-sm italic mt-2">Tonight's Special Order</p>
    </header>

    <main class="w-full max-w-md">
        
        <!-- 注文票 (謎解きエリア) -->
        <div class="order-slip p-6 mb-8 text-center">
            <h2 class="text-xs text-gray-500 mb-3 tracking-widest font-sans border-b border-dashed border-gray-300 pb-2">ORDER SLIP #<span id="order-num">001</span></h2>
            <div id="recipe-name" class="text-xl font-bold mb-4 text-[#8b4513]">読み込み中...</div>
            <p id="recipe-hints" class="text-sm leading-relaxed text-gray-700 font-medium"></p>
            <p class="text-[10px] text-gray-400 mt-4 font-sans text-right">※ご要望に合う食材を選び、調理してください。</p>
        </div>

        <!-- お鍋エリア -->
        <div class="cauldron-container mb-6" id="pot-area">
            <!-- 湯気 -->
            <div class="steam" style="left: 80px; animation-delay: 0s;"></div>
            <div class="steam" style="left: 140px; animation-delay: 1.5s;"></div>
            
            <div class="cauldron">
                <div class="cauldron-lip"></div>
                <div class="cauldron-inside" id="pot-liquid"></div>
            </div>
            <div class="fire">
                <div class="flame"></div><div class="flame"></div><div class="flame"></div>
                <div class="flame"></div><div class="flame"></div>
            </div>
        </div>

        <!-- お鍋の中身表示 -->
        <div class="flex justify-between items-center bg-[#1e1e1e] rounded-lg p-3 mb-6 border border-[#333]">
            <div class="flex-1 flex gap-3 overflow-x-auto min-h-[40px] items-center px-2" id="current-ingredients">
                <span class="text-gray-500 text-sm font-sans">鍋は空です...</span>
            </div>
            <button onclick="clearPot()" class="text-xs bg-transparent border border-gray-600 text-gray-400 px-3 py-1.5 rounded hover:bg-gray-800 transition font-sans">
                リセット
            </button>
        </div>

        <!-- アクションボタン -->
        <div class="flex justify-center mb-8">
            <button onclick="cook()" class="bg-gradient-to-b from-[#cd853f] to-[#8b4513] hover:from-[#d2965b] hover:to-[#a0522d] text-white text-lg font-bold py-3 px-16 rounded shadow-[0_4px_15px_rgba(205,133,63,0.4)] transition-all active:scale-95 tracking-widest">
                火にかける
            </button>
        </div>

        <!-- 食材リスト -->
        <div class="mb-4">
            <h3 class="text-[#cd853f] text-sm tracking-widest mb-3 font-sans border-l-2 border-[#cd853f] pl-2">INGREDIENTS</h3>
            <div class="grid grid-cols-4 gap-2" id="pantry">
                <!-- 食材ボタン生成 -->
            </div>
        </div>
    </main>

    <!-- 結果モーダル（写真風） -->
    <div id="result-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden bg-black/80 backdrop-blur-sm">
        <div class="photo-frame max-w-sm w-full relative">
            <div class="bg-[#111] w-full h-48 mb-4 flex items-center justify-center border border-gray-200 overflow-hidden relative" id="result-img-area">
                <div id="result-icon" class="text-7xl drop-shadow-lg relative z-10"></div>
                <!-- 湯気エフェクト用 -->
                <div class="absolute inset-0 opacity-30 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.8)_0%,transparent_70%)] animate-pulse"></div>
            </div>
            <h2 id="result-title" class="text-2xl font-bold text-[#2c3e50] mb-2 font-serif"></h2>
            <p id="result-desc" class="text-gray-600 mb-6 text-sm leading-relaxed font-serif h-24 overflow-y-auto"></p>
            
            <div class="flex justify-between items-center mt-2 border-t border-gray-200 pt-4">
                <span class="text-gray-400 text-xs font-sans" id="date-stamp"></span>
                <button onclick="nextOrder()" id="next-btn" class="bg-[#2c3e50] text-white text-sm py-2 px-6 rounded hover:bg-[#1a252f] transition font-sans">次の注文へ</button>
                <button onclick="closeModal()" id="retry-btn" class="hidden bg-transparent border border-gray-400 text-gray-600 text-sm py-2 px-6 rounded hover:bg-gray-100 transition font-sans">作り直す</button>
            </div>
        </div>
    </div>

    <script>
        // --- データ定義 (大人向けに調整) ---
        const ingredientsList = [
            { id: 'bacon', icon: '🥓', name: '燻製ベーコン' },
            { id: 'egg', icon: '🥚', name: '朝採り卵' },
            { id: 'meat', icon: '🥩', name: '骨付き肉' },
            { id: 'fish', icon: '🐟', name: '港の鮮魚' },
            { id: 'tomato', icon: '🍅', name: '完熟トマト' },
            { id: 'onion', icon: '🧅', name: '涙の玉ねぎ' },
            { id: 'mushroom', icon: '🍄', name: '深森のキノコ' },
            { id: 'garlic', icon: '🧄', name: '焦がし大蒜' },
            { id: 'flour', icon: '🌾', name: '小麦粉' },
            { id: 'rice', icon: '🍚', name: '銀シャリ' },
            { id: 'cheese', icon: '🧀', name: '熟成チーズ' },
            { id: 'wine', icon: '🍷', name: '赤ワイン' },
            { id: 'herb', icon: '🌿', name: '香草' },
            { id: 'salt', icon: '🧂', name: '粗塩' },
            { id: 'pumpkin', icon: '🎃', name: 'かぼちゃ' },
            { id: 'milk', icon: '🥛', name: '濃厚ミルク' }
        ];

        // 謎解き形式のレシピ
        const recipes = [
            {
                name: "逃亡者のための朝食",
                hint: "「追手を撒いて帰ってきた朝は、無性に腹が減るんだ。脂が弾ける分厚い肉と、黄身がとろける丸いアレを焼いてくれないか。」",
                ingredients: ["🥓", "🥚"],
                resultIcon: "🍳",
                title: "ベーコンエッグ",
                desc: "分厚い燻製ベーコンから滲み出た脂で、卵の縁がカリッと揚がるように焼かれている。フライパンから直接かき込みたくなる、背徳的で生命力あふれる味。",
                color: "#e67e22"
            },
            {
                name: "月夜の泥棒パスタ",
                hint: "「とある公国の地下で食べた味が忘れられなくてね。炭水化物に、赤いソース、それに大きな肉の塊がゴロゴロ入った豪快なヤツを頼むよ。」",
                ingredients: ["🌾", "🍅", "🥩"],
                resultIcon: "🍝",
                title: "特大ミートボールスパゲッティ",
                desc: "山盛りのパスタを覆い尽くす、酸味の効いたトマトソースと拳ほどもあるミートボール。フォークにくるくると巻き付け、誰かと奪い合うように食べたい一皿。",
                color: "#c0392b"
            },
            {
                name: "嵐の夜の特製パイ",
                hint: "「孫娘には少し不評だったんだけれど……港で獲れた新鮮な海の幸と、甘い秋の野菜を、生地で包んでオーブンで焼いた、私の自慢の料理なの。」",
                ingredients: ["🐟", "🎃", "🌾"],
                resultIcon: "🥧",
                title: "ニシンとカボチャの包み焼き",
                desc: "こんがり焼けたパイ生地にフォークを入れると、ホクホクのカボチャの甘みと白身魚の旨味が湯気となって立ち上る。雨の日に食べると、なぜか少し泣きたくなる優しい味。",
                color: "#d35400"
            },
            {
                name: "海賊団の夜食シチュー",
                hint: "「飛行船の厨房ってのは冷えるんだ。肉と、涙が出る野菜と、赤い果実をグツグツ煮込んでくれ。仕上げに発酵した乳製品を削ってコクを出してな。」",
                ingredients: ["🥩", "🧅", "🍅", "🧀"],
                resultIcon: "🍲",
                title: "ごろごろ肉のチーズシチュー",
                desc: "スプーンで切れるほどホロホロに煮込まれた肉と、トロトロの玉ねぎ。溶け込んだチーズが濃厚なコクを生み出し、冷え切った身体の芯まで温めてくれる。",
                color: "#8b4513"
            },
            {
                name: "迷子のための塩むすび",
                hint: "「……何にもいらない。ただ、白い粒を炊いたものに、しょっぱい結晶をまぶして、ギュッと握ってほしいの。おまじないをかけて。」",
                ingredients: ["🍚", "🧂"],
                resultIcon: "🍙",
                title: "まじないの塩むすび",
                desc: "具材は何も入っていない。ただの米と塩。しかし一口かじると、張り詰めていた緊張の糸がプツリと切れ、大粒の涙と一緒に飲み込みたくなるような、魂を慰める味がする。",
                color: "#ecf0f1"
            }
        ];

        // --- 状態管理 ---
        let currentRecipeIndex = 0;
        let potContents = [];
        let isCooking = false;

        // --- 初期化 ---
        function initGame() {
            renderPantry();
            loadRecipe();
            
            // 日付スタンプのセット
            const today = new Date();
            document.getElementById('date-stamp').textContent = 
                `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
        }

        // 食材リストの生成
        function renderPantry() {
            const pantryEl = document.getElementById('pantry');
            pantryEl.innerHTML = '';
            ingredientsList.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'ingredient-btn rounded p-2 text-2xl flex flex-col items-center justify-center';
                btn.onclick = () => addIngredient(item.icon, item.name);
                btn.innerHTML = `
                    <span>${item.icon}</span>
                    <span class="text-[9px] text-gray-400 mt-1 truncate w-full text-center tracking-wider">${item.name}</span>
                `;
                pantryEl.appendChild(btn);
            });
        }

        // レシピの読み込み
        function loadRecipe() {
            const recipe = recipes[currentRecipeIndex];
            document.getElementById('order-num').textContent = String(currentRecipeIndex + 1).padStart(3, '0');
            document.getElementById('recipe-name').textContent = `「${recipe.name}」`;
            document.getElementById('recipe-hints').textContent = recipe.hint;
            clearPot();
        }

        // --- アクション ---

        // 鍋に食材を入れる
        function addIngredient(icon, name) {
            if (isCooking) return;
            if (potContents.length >= 5) {
                return; // 大人向けなのでアラートは出さず静かに無視
            }

            potContents.push(icon);
            updatePotUI();

            // 落ちるアニメーション
            const potArea = document.getElementById('pot-area');
            const dropEl = document.createElement('div');
            dropEl.textContent = icon;
            dropEl.className = 'ingredient-drop';
            
            const randomX = 70 + Math.random() * 80;
            dropEl.style.left = `${randomX}px`;
            dropEl.style.top = '10px';
            
            potArea.appendChild(dropEl);

            setTimeout(() => {
                dropEl.remove();
                changePotLiquidColor();
            }, 400);
        }

        // UI更新
        function updatePotUI() {
            const displayEl = document.getElementById('current-ingredients');
            if (potContents.length === 0) {
                displayEl.innerHTML = '<span class="text-gray-500 text-sm font-sans">鍋は空です...</span>';
            } else {
                displayEl.innerHTML = potContents.map(icon => 
                    `<span class="text-xl bg-gray-800 border border-gray-600 rounded px-1">${icon}</span>`
                ).join('');
            }
        }

        function clearPot() {
            potContents = [];
            updatePotUI();
            document.getElementById('pot-liquid').style.background = '#2c3e50';
        }

        // 鍋の液体の色をシックに変化
        function changePotLiquidColor() {
            const colors = ['#4a2311', '#5c2a16', '#2d3436', '#8b0000', '#2f4f4f'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('pot-liquid').style.background = randomColor;
        }

        // 調理開始
        function cook() {
            if (isCooking) return;
            if (potContents.length === 0) return;

            isCooking = true;
            
            const cauldron = document.querySelector('.cauldron');
            const flames = document.querySelectorAll('.flame');
            
            // 鍋の揺れ
            cauldron.style.transform = 'translateY(-2px)';
            cauldron.style.transition = 'all 0.1s infinite alternate';
            
            // 炎を赤く激しく
            flames.forEach(flame => flame.classList.add('cooking-flame'));

            // グツグツ泡を出す
            let bubbleInterval = setInterval(() => {
                createBubble();
            }, 80);

            // シズル感を出すため3秒待つ
            setTimeout(() => {
                clearInterval(bubbleInterval);
                cauldron.style.transform = 'none';
                cauldron.style.transition = 'none';
                flames.forEach(flame => flame.classList.remove('cooking-flame'));
                
                checkResult();
                isCooking = false;
            }, 3000);
        }

        // 泡エフェクト
        function createBubble() {
            const potLiquid = document.getElementById('pot-liquid');
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            const size = 5 + Math.random() * 15;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            
            const left = 20 + Math.random() * 140;
            bubble.style.left = `${left}px`;
            bubble.style.top = '10px';
            
            potLiquid.appendChild(bubble);
            
            setTimeout(() => {
                if(bubble.parentNode) bubble.remove();
            }, 800);
        }

        // 結果の判定
        function checkResult() {
            const currentRecipe = recipes[currentRecipeIndex];
            
            const potSorted = [...potContents].sort().join('');
            const recipeSorted = [...currentRecipe.ingredients].sort().join('');

            if (potSorted === recipeSorted) {
                showModal(true, currentRecipe);
            } else {
                showModal(false, currentRecipe);
            }
        }

        // --- モーダル制御 ---
        function showModal(isSuccess, recipe) {
            const modal = document.getElementById('result-modal');
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const nextBtn = document.getElementById('next-btn');
            const retryBtn = document.getElementById('retry-btn');
            const imgArea = document.getElementById('result-img-area');
            const modalContent = modal.querySelector('.photo-frame');

            modal.classList.remove('hidden');
            modalContent.classList.add('modal-enter');

            if (isSuccess) {
                icon.textContent = recipe.resultIcon;
                imgArea.style.background = `radial-gradient(circle, ${recipe.color} 0%, #111 100%)`;
                title.textContent = recipe.title;
                desc.innerText = recipe.desc;
                nextBtn.classList.remove('hidden');
                retryBtn.classList.add('hidden');
            } else {
                icon.textContent = "🌑";
                imgArea.style.background = "#000";
                title.textContent = "得体の知れない物体";
                desc.innerText = "焦げ臭い匂いと、謎の粘り気。お客様の望んでいた味ではないようだ。注文票（オーダー）のヒントをもう一度読み直して、材料を選び直そう。";
                nextBtn.classList.add('hidden');
                retryBtn.classList.remove('hidden');
            }

            setTimeout(() => {
                modalContent.classList.remove('modal-enter');
            }, 500);
        }

        function closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
            clearPot();
        }

        function nextOrder() {
            closeModal();
            currentRecipeIndex++;
            
            if (currentRecipeIndex >= recipes.length) {
                // エンディング演出
                document.getElementById('recipe-name').textContent = "「閉店時間」";
                document.getElementById('recipe-hints').textContent = "今夜の食材はすべて売り切れました。路地裏の食堂は、また明日、誰かが迷い込むまでひっそりと暖簾を下ろします。ご来店、ありがとうございました。";
                document.getElementById('pot-area').style.opacity = '0.3';
                document.querySelector('.fire').style.display = 'none';
                return;
            }
            
            loadRecipe();
        }

        window.onload = initGame;
    </script>
</body>
</html>
